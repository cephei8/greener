version: 2

updates:
  - package-ecosystem: gomod
    directory: /server
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /reporting/greener-reporter
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /reporting/greener-reporter-go
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /reporting/greener-reporter-cli
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: /reporting/greener-reporter-junitxml
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /reporting/greener-reporter-js
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /reporting/jest-greener
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /reporting/mocha-greener
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /reporting/greener-reporter-py
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /reporting/pytest-greener
